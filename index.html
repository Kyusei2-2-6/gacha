<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#04060f" />
  <title>Gacha Simulator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main id="app">
    <header class="site-header">
      <h1 class="site-logo">GACHA SIMULATOR</h1>
      <p class="site-subtitle">Dark Fantasy RPG</p>
    </header>

    <section class="hud-bar" aria-label="Status pemain">
      <div id="gem-display" title="Jumlah Gem">
        <span class="gem-icon">💎</span>
        <span id="gem-count">0</span>
      </div>
      <div class="hud-pulls">
        <small>Total Pull</small>
        <span id="pull-count">0</span>
      </div>
    </section>

    <section class="pity-section" aria-label="Progress pity SSR">
      <div class="pity-label">
        <span>SSR Pity</span>
        <span id="pity-text">0 / 90</span>
      </div>
      <div class="pity-track">
        <div id="pity-bar"></div>
      </div>
    </section>

    <section class="banner-section" aria-label="Banner gacha">
      <div class="banner-art">
        <div class="banner-runes" aria-hidden="true">
          <span class="rune">✦</span>
          <span class="rune">✧</span>
          <span class="rune">✺</span>
          <span class="rune">✹</span>
        </div>
        <div class="banner-title-art">
          <h2>Celestial Covenant</h2>
          <p>Limited Summon Banner</p>
        </div>
      </div>

      <div class="banner-rates">
        <div class="rate-item ssr">
          <div class="rate-label">SSR</div>
          <div class="rate-val">0.6%</div>
        </div>
        <div class="rate-item sr">
          <div class="rate-label">SR</div>
          <div class="rate-val">5.7%</div>
        </div>
        <div class="rate-item r">
          <div class="rate-label">R</div>
          <div class="rate-val">93.7%</div>
        </div>
      </div>
    </section>

    <section class="pull-section" aria-label="Tombol pull">
      <button id="btn-pull1" class="pull-btn btn-pull1" type="button">
        <span class="btn-label">Pull ×1</span>
        <span class="btn-cost">160 💎</span>
      </button>
      <button id="btn-pull10" class="pull-btn btn-pull10" type="button">
        <span class="btn-label">Pull ×10</span>
        <span class="btn-cost">1600 💎</span>
      </button>
    </section>

    <section class="util-section" aria-label="Utility">
      <button id="btn-add-gems" class="util-btn btn-add-gems" type="button">+ 3200 Gems</button>
      <button id="btn-reset" class="util-btn btn-reset" type="button">Reset Data</button>
    </section>

    <div class="section-divider">Collection</div>

    <section class="tabs-section">
      <nav class="tab-nav" aria-label="Tab koleksi">
        <button class="tab-btn active" type="button" data-tab="inventory">Inventory</button>
        <button class="tab-btn" type="button" data-tab="history">History</button>
      </nav>

      <div class="tab-content">
        <section id="tab-inventory" class="tab-panel active">
          <div id="inventory-grid"></div>
        </section>
        <section id="tab-history" class="tab-panel">
          <div id="history-list"></div>
        </section>
      </div>
    </section>
  </main>

  <section id="result-overlay" aria-label="Hasil gacha">
    <div class="result-header">Summon Result</div>
    <div id="result-grid"></div>
    <button id="btn-close-result" type="button">Close</button>
  </section>

  <script src="js/data.js"></script>
  <script src="js/gacha.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
